name: Benchmark Gates

on:
  workflow_dispatch:
    inputs:
      suite:
        description: Benchmark suite
        required: true
        default: all
        type: choice
        options:
          - all
          - viewer
          - surfacecharts
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read

jobs:
  viewer-benchmarks:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' && (github.event.inputs.suite == 'all' || github.event.inputs.suite == 'viewer') }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run viewer benchmark evidence
        shell: pwsh
        run: pwsh -File ./scripts/Run-Benchmarks.ps1 -Suite Viewer -Configuration Release -OutputRoot artifacts/benchmarks

      - name: Evaluate viewer benchmark thresholds
        shell: pwsh
        run: pwsh -File ./scripts/Test-BenchmarkThresholds.ps1 -Suite Viewer -OutputRoot artifacts/benchmarks

      - name: Upload viewer benchmark evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-viewer
          path: artifacts/benchmarks/viewer
          if-no-files-found: ignore

  surfacecharts-benchmarks:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' && (github.event.inputs.suite == 'all' || github.event.inputs.suite == 'surfacecharts') }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run surface charts benchmark evidence
        shell: pwsh
        run: pwsh -File ./scripts/Run-Benchmarks.ps1 -Suite SurfaceCharts -Configuration Release -OutputRoot artifacts/benchmarks

      - name: Evaluate surface charts benchmark thresholds
        shell: pwsh
        run: pwsh -File ./scripts/Test-BenchmarkThresholds.ps1 -Suite SurfaceCharts -OutputRoot artifacts/benchmarks

      - name: Upload surface charts benchmark evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: benchmarks-surfacecharts
          path: artifacts/benchmarks/surfacecharts
          if-no-files-found: ignore
