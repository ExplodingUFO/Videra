name: Consumer Smoke

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      target:
        description: Consumer smoke target
        required: true
        default: all
        type: choice
        options:
          - all
          - windows
          - windows-surfacecharts
          - linux-x11
          - linux-xwayland
          - macos

permissions:
  contents: read

jobs:
  windows-consumer-smoke:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'windows' }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run Windows consumer smoke
        shell: pwsh
        run: pwsh -File ./scripts/Invoke-ConsumerSmoke.ps1 -Configuration Release -OutputRoot artifacts/consumer-smoke/windows

      - name: Upload Windows consumer smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-smoke-windows
          path: artifacts/consumer-smoke/windows

  windows-surfacecharts-consumer-smoke:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'windows-surfacecharts' }}
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run Windows SurfaceCharts consumer smoke
        shell: pwsh
        run: >
          pwsh -File ./scripts/Invoke-ConsumerSmoke.ps1 -Configuration Release
          -Scenario SurfaceCharts
          -OutputRoot artifacts/consumer-smoke/windows-surfacecharts

      - name: Upload Windows SurfaceCharts consumer smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-smoke-windows-surfacecharts
          path: artifacts/consumer-smoke/windows-surfacecharts

  linux-x11-consumer-smoke:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'linux-x11' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install Linux X11 prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-6 libvulkan1 libshaderc1 mesa-vulkan-drivers vulkan-tools powershell

      - name: Run Linux X11 consumer smoke
        run: xvfb-run -a pwsh -File ./scripts/Invoke-ConsumerSmoke.ps1 -Configuration Release -OutputRoot artifacts/consumer-smoke/linux-x11

      - name: Upload Linux X11 consumer smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-smoke-linux-x11
          path: artifacts/consumer-smoke/linux-x11

  linux-xwayland-consumer-smoke:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'linux-xwayland' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install Linux XWayland prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y xwayland-run libx11-6 libwayland-client0 libvulkan1 libshaderc1 mesa-vulkan-drivers vulkan-tools powershell

      - name: Run Linux XWayland consumer smoke
        run: |
          xwfb-run -- bash -lc 'env | sort | grep -E "^(DISPLAY|WAYLAND_DISPLAY|XDG_RUNTIME_DIR|XDG_SESSION_TYPE)=" || true; if [[ -z "${DISPLAY:-}" ]]; then echo "DISPLAY is not set. Start an XWayland session or run this command under xwfb-run." >&2; exit 2; fi; if [[ -z "${WAYLAND_DISPLAY:-}" ]]; then echo "WAYLAND_DISPLAY is not set. Start a Wayland session with XWayland available before running this target." >&2; exit 2; fi; export XDG_SESSION_TYPE="${XDG_SESSION_TYPE:-wayland}"; pwsh -File ./scripts/Invoke-ConsumerSmoke.ps1 -Configuration Release -OutputRoot artifacts/consumer-smoke/linux-xwayland'

      - name: Upload Linux XWayland consumer smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-smoke-linux-xwayland
          path: artifacts/consumer-smoke/linux-xwayland

  macos-consumer-smoke:
    if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == 'macos' }}
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run macOS consumer smoke
        shell: pwsh
        run: pwsh -File ./scripts/Invoke-ConsumerSmoke.ps1 -Configuration Release -OutputRoot artifacts/consumer-smoke/macos

      - name: Upload macOS consumer smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-smoke-macos
          path: artifacts/consumer-smoke/macos
