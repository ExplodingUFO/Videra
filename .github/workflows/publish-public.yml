name: Publish Public Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Version-aligned git tag to publish to nuget.org
        required: true
        type: string
      version:
        description: SemVer package version expected for the tag
        required: true
        type: string
      expected_commit:
        description: Source commit expected at the tag
        required: true
        type: string

permissions:
  contents: write

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      source_commit: ${{ steps.version.outputs.source_commit }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Determine version from explicit release inputs
        id: version
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          version="${{ inputs.version }}"
          expected_commit="${{ inputs.expected_commit }}"

          if [[ -z "${tag}" || "${tag}" != v* ]]; then
            echo "Expected a version tag that starts with 'v'." >&2
            exit 1
          fi

          tag_version="${tag#v}"
          if [[ -z "${version}" || "${version}" != "${tag_version}" ]]; then
            echo "Version input '${version}' does not match tag '${tag}'." >&2
            exit 1
          fi

          source_commit="$(git rev-parse HEAD)"
          if [[ -z "${expected_commit}" || "${source_commit}" != "${expected_commit}"* ]]; then
            echo "Source commit '${source_commit}' does not match expected commit '${expected_commit}'." >&2
            exit 1
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "source_commit=${source_commit}" >> "${GITHUB_OUTPUT}"

  linux-x11-native-validation:
    needs: determine-version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install Linux native prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-6 libvulkan1 libshaderc1 mesa-vulkan-drivers vulkan-tools

      - name: Run Linux X11 native validation
        env:
          VIDERA_VERBOSE_TEST_LOGS: "true"
        run: xvfb-run -a bash ./scripts/run-native-validation.sh --platform linux --linux-display-server x11 --configuration Release

  linux-wayland-xwayland-native-validation:
    needs: determine-version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install Linux Wayland/XWayland prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y xwayland-run libx11-6 libwayland-client0 libvulkan1 libshaderc1 mesa-vulkan-drivers vulkan-tools

      - name: Run Linux Wayland-session XWayland validation
        env:
          VIDERA_VERBOSE_TEST_LOGS: "true"
        run: |
          xwfb-run -- bash -lc 'env | sort | grep -E "^(DISPLAY|WAYLAND_DISPLAY|XDG_RUNTIME_DIR|XDG_SESSION_TYPE)=" || true; bash ./scripts/run-native-validation.sh --platform linux --linux-display-server xwayland --configuration Release'

  macos-native-validation:
    needs: determine-version
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run macOS native validation
        env:
          VIDERA_VERBOSE_TEST_LOGS: "true"
        run: bash ./scripts/run-native-validation.sh --platform macos --configuration Release

  windows-native-validation:
    needs: determine-version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run Windows native validation
        env:
          VIDERA_VERBOSE_TEST_LOGS: "true"
        shell: pwsh
        run: pwsh -File ./scripts/run-native-validation.ps1 -Platform Windows -Configuration Release

  windows-consumer-smoke:
    needs: determine-version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run Windows consumer smoke
        shell: pwsh
        run: pwsh -File ./scripts/Invoke-ConsumerSmoke.ps1 -Configuration Release -LightingProofHoldSeconds 10 -OutputRoot artifacts/consumer-smoke/windows

      - name: Upload Windows consumer smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-smoke-windows
          path: artifacts/consumer-smoke/windows

  windows-surfacecharts-consumer-smoke:
    needs: determine-version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run Windows SurfaceCharts consumer smoke
        shell: pwsh
        run: >
          pwsh -File ./scripts/Invoke-ConsumerSmoke.ps1 -Configuration Release -LightingProofHoldSeconds 10
          -Scenario SurfaceCharts
          -OutputRoot artifacts/consumer-smoke/windows-surfacecharts

      - name: Upload Windows SurfaceCharts consumer smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-smoke-windows-surfacecharts
          path: artifacts/consumer-smoke/windows-surfacecharts

  linux-x11-consumer-smoke:
    needs: determine-version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install Linux X11 consumer smoke prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-6 libvulkan1 libshaderc1 mesa-vulkan-drivers vulkan-tools powershell

      - name: Run Linux X11 consumer smoke
        run: xvfb-run -a pwsh -File ./scripts/Invoke-ConsumerSmoke.ps1 -Configuration Release -LightingProofHoldSeconds 10 -OutputRoot artifacts/consumer-smoke/linux-x11

      - name: Upload Linux X11 consumer smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-smoke-linux-x11
          path: artifacts/consumer-smoke/linux-x11

  linux-xwayland-consumer-smoke:
    needs: determine-version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install Linux XWayland consumer smoke prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y xwayland-run libx11-6 libwayland-client0 libvulkan1 libshaderc1 mesa-vulkan-drivers vulkan-tools powershell

      - name: Run Linux XWayland consumer smoke
        run: |
          xwfb-run -- bash -lc 'env | sort | grep -E "^(DISPLAY|WAYLAND_DISPLAY|XDG_RUNTIME_DIR|XDG_SESSION_TYPE)=" || true; if [[ -z "${DISPLAY:-}" ]]; then echo "DISPLAY is not set. Start an XWayland session or run this command under xwfb-run." >&2; exit 2; fi; if [[ -z "${WAYLAND_DISPLAY:-}" ]]; then echo "WAYLAND_DISPLAY is not set. Start a Wayland session with XWayland available before running this target." >&2; exit 2; fi; export XDG_SESSION_TYPE="${XDG_SESSION_TYPE:-wayland}"; pwsh -File ./scripts/Invoke-ConsumerSmoke.ps1 -Configuration Release -LightingProofHoldSeconds 10 -OutputRoot artifacts/consumer-smoke/linux-xwayland'

      - name: Upload Linux XWayland consumer smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-smoke-linux-xwayland
          path: artifacts/consumer-smoke/linux-xwayland

  macos-consumer-smoke:
    needs: determine-version
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run macOS consumer smoke
        shell: pwsh
        run: pwsh -File ./scripts/Invoke-ConsumerSmoke.ps1 -Configuration Release -LightingProofHoldSeconds 10 -OutputRoot artifacts/consumer-smoke/macos

      - name: Upload macOS consumer smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-smoke-macos
          path: artifacts/consumer-smoke/macos

  neutral-package-evidence:
    needs: determine-version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Pack neutral and import packages
        shell: pwsh
        run: |
          dotnet pack src/Videra.Core/Videra.Core.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}
          dotnet pack src/Videra.Import.Gltf/Videra.Import.Gltf.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}
          dotnet pack src/Videra.Import.Obj/Videra.Import.Obj.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}
          dotnet pack src/Videra.Avalonia/Videra.Avalonia.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}
          dotnet pack src/Videra.SurfaceCharts.Core/Videra.SurfaceCharts.Core.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}
          dotnet pack src/Videra.SurfaceCharts.Rendering/Videra.SurfaceCharts.Rendering.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}
          dotnet pack src/Videra.SurfaceCharts.Processing/Videra.SurfaceCharts.Processing.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}
          dotnet pack src/Videra.SurfaceCharts.Avalonia/Videra.SurfaceCharts.Avalonia.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}

      - name: Upload neutral package evidence
        uses: actions/upload-artifact@v4
        with:
          name: package-evidence-neutral
          path: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg

  linux-package-evidence:
    needs:
      - determine-version
      - linux-x11-native-validation
      - linux-wayland-xwayland-native-validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Pack Linux platform package
        run: dotnet pack src/Videra.Platform.Linux/Videra.Platform.Linux.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}

      - name: Upload Linux package evidence
        uses: actions/upload-artifact@v4
        with:
          name: package-evidence-linux
          path: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg

  macos-package-evidence:
    needs:
      - determine-version
      - macos-native-validation
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Pack macOS platform package
        run: dotnet pack src/Videra.Platform.macOS/Videra.Platform.macOS.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}

      - name: Upload macOS package evidence
        uses: actions/upload-artifact@v4
        with:
          name: package-evidence-macos
          path: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg

  windows-package-evidence:
    needs:
      - determine-version
      - windows-native-validation
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Pack Windows platform package
        shell: pwsh
        run: dotnet pack src/Videra.Platform.Windows/Videra.Platform.Windows.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}

      - name: Upload Windows package evidence
        uses: actions/upload-artifact@v4
        with:
          name: package-evidence-windows
          path: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg

  publish:
    needs:
      - determine-version
      - linux-x11-native-validation
      - linux-wayland-xwayland-native-validation
      - macos-native-validation
      - windows-native-validation
      - windows-surfacecharts-consumer-smoke
      - windows-consumer-smoke
      - linux-x11-consumer-smoke
      - linux-xwayland-consumer-smoke
      - macos-consumer-smoke
      - neutral-package-evidence
      - linux-package-evidence
      - macos-package-evidence
      - windows-package-evidence
    runs-on: windows-latest
    environment: public-release

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.determine-version.outputs.tag }}

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run repository verification
        shell: pwsh
        run: pwsh -File ./scripts/verify.ps1 -Configuration Release

      - name: Download package evidence
        uses: actions/download-artifact@v4
        with:
          pattern: package-evidence-*
          path: ./nupkgs
          merge-multiple: true

      - name: Validate packed artifacts
        shell: pwsh
        run: pwsh -File ./scripts/Validate-Packages.ps1 -PackageRoot ./nupkgs -ExpectedVersion ${{ needs.determine-version.outputs.version }}

      - name: Write pre-publish evidence
        shell: pwsh
        run: |
          $validationArtifacts = @(
            "scripts/verify.ps1",
            "scripts/Validate-Packages.ps1",
            "package-evidence-*",
            "consumer-smoke-*",
            "native-validation jobs"
          )
          pwsh -File ./scripts/New-PublicPublishEvidence.ps1 `
            -PackageRoot ./nupkgs `
            -ExpectedVersion ${{ needs.determine-version.outputs.version }} `
            -ReleaseTag ${{ needs.determine-version.outputs.tag }} `
            -SourceCommit ${{ needs.determine-version.outputs.source_commit }} `
            -PublishTarget https://api.nuget.org/v3/index.json `
            -Stage before-publish `
            -OutputRoot artifacts/public-publish `
            -ValidationArtifacts $validationArtifacts

      - name: Push public packages to nuget.org
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path ./nupkgs/*.nupkg
          foreach ($package in $packages) {
            dotnet nuget push $package.FullName --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
          }

          $symbolPackages = Get-ChildItem -Path ./nupkgs/*.snupkg -ErrorAction SilentlyContinue
          foreach ($package in $symbolPackages) {
            dotnet nuget push $package.FullName --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
          }

      # Generated release notes categories come from .github/release.yml.
      - name: Create GitHub release with package assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg

      - name: Write post-publish evidence
        shell: pwsh
        run: |
          $validationArtifacts = @(
            "scripts/verify.ps1",
            "scripts/Validate-Packages.ps1",
            "package-evidence-*",
            "consumer-smoke-*",
            "native-validation jobs",
            "nuget.org package push",
            "GitHub release assets"
          )
          pwsh -File ./scripts/New-PublicPublishEvidence.ps1 `
            -PackageRoot ./nupkgs `
            -ExpectedVersion ${{ needs.determine-version.outputs.version }} `
            -ReleaseTag ${{ needs.determine-version.outputs.tag }} `
            -SourceCommit ${{ needs.determine-version.outputs.source_commit }} `
            -PublishTarget https://api.nuget.org/v3/index.json `
            -Stage after-publish `
            -OutputRoot artifacts/public-publish `
            -ValidationArtifacts $validationArtifacts

      - name: Upload public publish evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-publish-evidence
          path: |
            artifacts/public-publish/public-publish-before-summary.json
            artifacts/public-publish/public-publish-before-summary.txt
            artifacts/public-publish/public-publish-after-summary.json
            artifacts/public-publish/public-publish-after-summary.txt
