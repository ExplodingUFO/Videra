name: Publish Public Packages

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  determine-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6

      - name: Determine version from tag
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "This workflow only publishes from tags." >&2
            exit 1
          fi

          version="${GITHUB_REF_NAME#v}"
          if [[ -z "${version}" ]]; then
            echo "Could not determine package version from tag." >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"

  linux-x11-native-validation:
    needs: determine-version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install Linux native prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libx11-6 libvulkan1 libshaderc1 mesa-vulkan-drivers vulkan-tools

      - name: Run Linux X11 native validation
        env:
          VIDERA_VERBOSE_TEST_LOGS: "true"
        run: xvfb-run -a bash ./scripts/run-native-validation.sh --platform linux --linux-display-server x11 --configuration Release

  linux-wayland-xwayland-native-validation:
    needs: determine-version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Install Linux Wayland/XWayland prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y xwayland-run libx11-6 libwayland-client0 libvulkan1 libshaderc1 mesa-vulkan-drivers vulkan-tools

      - name: Run Linux Wayland-session XWayland validation
        env:
          VIDERA_VERBOSE_TEST_LOGS: "true"
        run: |
          xwfb-run -- bash -lc 'env | sort | grep -E "^(DISPLAY|WAYLAND_DISPLAY|XDG_RUNTIME_DIR|XDG_SESSION_TYPE)=" || true; bash ./scripts/run-native-validation.sh --platform linux --linux-display-server xwayland --configuration Release'

  macos-native-validation:
    needs: determine-version
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run macOS native validation
        env:
          VIDERA_VERBOSE_TEST_LOGS: "true"
        run: bash ./scripts/run-native-validation.sh --platform macos --configuration Release

  windows-native-validation:
    needs: determine-version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run Windows native validation
        env:
          VIDERA_VERBOSE_TEST_LOGS: "true"
        shell: pwsh
        run: pwsh -File ./scripts/run-native-validation.ps1 -Platform Windows -Configuration Release

  neutral-package-evidence:
    needs: determine-version
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Pack neutral packages
        shell: pwsh
        run: |
          dotnet pack src/Videra.Core/Videra.Core.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}
          dotnet pack src/Videra.Avalonia/Videra.Avalonia.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}

      - name: Upload neutral package evidence
        uses: actions/upload-artifact@v4
        with:
          name: package-evidence-neutral
          path: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg

  linux-package-evidence:
    needs:
      - determine-version
      - linux-x11-native-validation
      - linux-wayland-xwayland-native-validation
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Pack Linux platform package
        run: dotnet pack src/Videra.Platform.Linux/Videra.Platform.Linux.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}

      - name: Upload Linux package evidence
        uses: actions/upload-artifact@v4
        with:
          name: package-evidence-linux
          path: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg

  macos-package-evidence:
    needs:
      - determine-version
      - macos-native-validation
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Pack macOS platform package
        run: dotnet pack src/Videra.Platform.macOS/Videra.Platform.macOS.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}

      - name: Upload macOS package evidence
        uses: actions/upload-artifact@v4
        with:
          name: package-evidence-macos
          path: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg

  windows-package-evidence:
    needs:
      - determine-version
      - windows-native-validation
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Pack Windows platform package
        shell: pwsh
        run: dotnet pack src/Videra.Platform.Windows/Videra.Platform.Windows.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ needs.determine-version.outputs.version }}

      - name: Upload Windows package evidence
        uses: actions/upload-artifact@v4
        with:
          name: package-evidence-windows
          path: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg

  publish:
    needs:
      - determine-version
      - linux-x11-native-validation
      - linux-wayland-xwayland-native-validation
      - macos-native-validation
      - windows-native-validation
      - neutral-package-evidence
      - linux-package-evidence
      - macos-package-evidence
      - windows-package-evidence
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run repository verification
        shell: pwsh
        run: pwsh -File ./scripts/verify.ps1 -Configuration Release

      - name: Download package evidence
        uses: actions/download-artifact@v8
        with:
          pattern: package-evidence-*
          path: ./nupkgs
          merge-multiple: true

      - name: Validate packed artifacts
        shell: pwsh
        run: pwsh -File ./scripts/Validate-Packages.ps1 -PackageRoot ./nupkgs -ExpectedVersion ${{ needs.determine-version.outputs.version }}

      - name: Push public packages to nuget.org
        shell: pwsh
        run: |
          dotnet nuget push ./nupkgs/*.nupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
          dotnet nuget push ./nupkgs/*.snupkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate

      # Generated release notes categories come from .github/release.yml.
      - name: Create GitHub release with package assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg
