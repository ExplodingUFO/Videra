name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Run repository verification
        shell: pwsh
        run: ./verify.ps1 -Configuration Release
