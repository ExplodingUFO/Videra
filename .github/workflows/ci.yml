name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  verify:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run repository verification
        shell: pwsh
        run: pwsh -File ./scripts/verify.ps1 -Configuration Release

  linux-package-evidence:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Pack Linux platform package
        run: dotnet pack src/Videra.Platform.Linux/Videra.Platform.Linux.csproj -c Release -o ./ci-pack/linux

  macos-package-evidence:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Pack macOS platform package
        run: dotnet pack src/Videra.Platform.macOS/Videra.Platform.macOS.csproj -c Release -o ./ci-pack/macos

  windows-package-evidence:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Pack Windows platform package
        shell: pwsh
        run: dotnet pack src/Videra.Platform.Windows/Videra.Platform.Windows.csproj -c Release -o ./ci-pack/windows

  sample-contract-evidence:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Run sample configuration evidence
        shell: pwsh
        run: >
          dotnet test tests/Videra.Core.Tests/Videra.Core.Tests.csproj -c Release
          --filter "FullyQualifiedName~ExtensibilitySampleConfigurationTests|FullyQualifiedName~InteractionSampleConfigurationTests"

      - name: Run SurfaceCharts sample evidence
        shell: pwsh
        run: >
          dotnet test tests/Videra.Core.Tests/Videra.Core.Tests.csproj -c Release
          --filter "FullyQualifiedName~SurfaceChartsDemoConfigurationTests|FullyQualifiedName~SurfaceChartsDemoViewportBehaviorTests"

      - name: Run sample runtime evidence
        shell: pwsh
        run: >
          dotnet test tests/Videra.Core.IntegrationTests/Videra.Core.IntegrationTests.csproj -c Release
          --filter "FullyQualifiedName~VideraViewExtensibilityIntegrationTests|FullyQualifiedName~VideraViewInteractionIntegrationTests|FullyQualifiedName~VideraViewInspectionIntegrationTests|FullyQualifiedName~VideraInspectionBundleIntegrationTests"

      - name: Run SurfaceCharts runtime evidence
        shell: pwsh
        run: >
          dotnet test tests/Videra.SurfaceCharts.Avalonia.IntegrationTests/Videra.SurfaceCharts.Avalonia.IntegrationTests.csproj -c Release
          --filter "FullyQualifiedName~SurfaceChartViewViewStateTests|FullyQualifiedName~SurfaceChartInteractionTests|FullyQualifiedName~SurfaceChartViewGpuFallbackTests|FullyQualifiedName~WaterfallChartViewIntegrationTests|FullyQualifiedName~ScatterChartViewIntegrationTests"

  performance-lab-visual-evidence:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Generate Performance Lab visual evidence
        shell: pwsh
        run: >
          pwsh -File ./scripts/Invoke-PerformanceLabVisualEvidence.ps1 -Configuration Release
          -OutputRoot artifacts/performance-lab-visual-evidence

      - name: Validate Performance Lab visual evidence
        shell: pwsh
        run: >
          dotnet test tests/Videra.Core.Tests/Videra.Core.Tests.csproj -c Release
          --filter "FullyQualifiedName~PerformanceLabVisualEvidenceTests"

      - name: Upload Performance Lab visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-lab-visual-evidence
          path: artifacts/performance-lab-visual-evidence

  quality-gate-evidence:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Determine consumer smoke package version
        id: consumer-smoke-version
        shell: pwsh
        run: |
          $resolvedVersion = (dotnet msbuild src/Videra.Avalonia/Videra.Avalonia.csproj -nologo -getProperty:Version | Select-Object -Last 1).Trim()
          if ([string]::IsNullOrWhiteSpace($resolvedVersion)) {
            throw "Unable to resolve Videra consumer package version."
          }

          $packageVersion =
            if ($resolvedVersion.Contains('-')) {
              "$resolvedVersion.consumer-smoke"
            }
            else {
              "$resolvedVersion-consumer-smoke"
            }

          "package_version=$packageVersion" >> $env:GITHUB_OUTPUT

      - name: Run packaged consumer smoke with warnings as errors
        shell: pwsh
        run: >
          pwsh -File ./scripts/Invoke-ConsumerSmoke.ps1 -Configuration Release -LightingProofHoldSeconds 10
          -OutputRoot artifacts/consumer-smoke-quality
          -TreatWarningsAsErrors

      - name: Run packaged SurfaceCharts consumer smoke with warnings as errors
        shell: pwsh
        run: >
          pwsh -File ./scripts/Invoke-ConsumerSmoke.ps1 -Configuration Release -LightingProofHoldSeconds 10
          -Scenario SurfaceCharts
          -OutputRoot artifacts/surfacecharts-consumer-smoke-quality
          -TreatWarningsAsErrors

      - name: Validate packaged consumer smoke artifacts
        shell: pwsh
        run: >
          pwsh -File ./scripts/Validate-Packages.ps1
          -PackageRoot artifacts/consumer-smoke-quality/packages
          -ExpectedVersion ${{ steps.consumer-smoke-version.outputs.package_version }}

      - name: Build core test evidence with warnings as errors
        shell: pwsh
        run: >
          dotnet build tests/Videra.Core.Tests/Videra.Core.Tests.csproj -c Release
          -p:TreatWarningsAsErrors=true

      - name: Build core integration evidence with warnings as errors
        shell: pwsh
        run: >
          dotnet build tests/Videra.Core.IntegrationTests/Videra.Core.IntegrationTests.csproj -c Release
          -p:TreatWarningsAsErrors=true

      - name: Build minimal sample evidence with warnings as errors
        shell: pwsh
        run: >
          dotnet build samples/Videra.MinimalSample/Videra.MinimalSample.csproj -c Release
          -p:TreatWarningsAsErrors=true
