name: Publish Existing Public Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing git tag to publish to nuget.org
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-existing-release:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Determine version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ inputs.tag }}".Trim()
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Tag input is required."
          }

          if (-not $tag.StartsWith("v")) {
            throw "Expected a version tag that starts with 'v'."
          }

          $version = $tag.Substring(1)
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Could not determine package version from tag $tag."
          }

          "tag=$tag" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Validate tag supports canonical public release helpers
        shell: pwsh
        run: |
          $requiredPaths = @(
            "scripts/verify.ps1",
            "scripts/Invoke-ConsumerSmoke.ps1",
            "scripts/Validate-Packages.ps1",
            "src/Videra.Core/Videra.Core.csproj",
            "src/Videra.Import.Gltf/Videra.Import.Gltf.csproj",
            "src/Videra.Import.Obj/Videra.Import.Obj.csproj",
            "src/Videra.Avalonia/Videra.Avalonia.csproj",
            "src/Videra.Platform.Windows/Videra.Platform.Windows.csproj",
            "src/Videra.Platform.Linux/Videra.Platform.Linux.csproj",
            "src/Videra.Platform.macOS/Videra.Platform.macOS.csproj",
            "src/Videra.SurfaceCharts.Core/Videra.SurfaceCharts.Core.csproj",
            "src/Videra.SurfaceCharts.Rendering/Videra.SurfaceCharts.Rendering.csproj",
            "src/Videra.SurfaceCharts.Processing/Videra.SurfaceCharts.Processing.csproj",
            "src/Videra.SurfaceCharts.Avalonia/Videra.SurfaceCharts.Avalonia.csproj"
          )

          $missingPaths = @($requiredPaths | Where-Object { -not (Test-Path $_) })
          if ($missingPaths.Count -gt 0) {
            throw "Tag ${{ steps.version.outputs.tag }} predates the current canonical public package line or release helper stack. publish-existing-public-release.yml only supports tags that already carry the current public package set and helper scripts. Missing paths: $($missingPaths -join ', ')"
          }

      - name: Run repository verification
        shell: pwsh
        run: |
          if (Test-Path ./scripts/verify.ps1) {
            pwsh -File ./scripts/verify.ps1 -Configuration Release
            exit $LASTEXITCODE
          }

          if (Test-Path ./verify.ps1) {
            pwsh -File ./verify.ps1 -Configuration Release
            exit $LASTEXITCODE
          }

          throw "Could not find a repository verification script for this tag."

      - name: Pack public packages
        shell: pwsh
        run: |
          dotnet pack src/Videra.Core/Videra.Core.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack src/Videra.Import.Gltf/Videra.Import.Gltf.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack src/Videra.Import.Obj/Videra.Import.Obj.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack src/Videra.Avalonia/Videra.Avalonia.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack src/Videra.Platform.Windows/Videra.Platform.Windows.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack src/Videra.Platform.Linux/Videra.Platform.Linux.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack src/Videra.Platform.macOS/Videra.Platform.macOS.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack src/Videra.SurfaceCharts.Core/Videra.SurfaceCharts.Core.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack src/Videra.SurfaceCharts.Rendering/Videra.SurfaceCharts.Rendering.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack src/Videra.SurfaceCharts.Processing/Videra.SurfaceCharts.Processing.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ steps.version.outputs.version }}
          dotnet pack src/Videra.SurfaceCharts.Avalonia/Videra.SurfaceCharts.Avalonia.csproj -c Release -o ./nupkgs /p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Run packaged consumer smoke
        shell: pwsh
        run: pwsh -File ./scripts/Invoke-ConsumerSmoke.ps1 -Configuration Release -LightingProofHoldSeconds 10 -OutputRoot artifacts/consumer-smoke/existing-release

      - name: Run packaged SurfaceCharts consumer smoke
        shell: pwsh
        run: >
          pwsh -File ./scripts/Invoke-ConsumerSmoke.ps1 -Configuration Release -LightingProofHoldSeconds 10
          -Scenario SurfaceCharts
          -OutputRoot artifacts/consumer-smoke/existing-release-surfacecharts

      - name: Upload consumer smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-smoke-existing-public-release
          path: artifacts/consumer-smoke/existing-release

      - name: Upload SurfaceCharts consumer smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: consumer-smoke-existing-public-release-surfacecharts
          path: artifacts/consumer-smoke/existing-release-surfacecharts

      - name: Validate packed artifacts
        shell: pwsh
        run: pwsh -File ./scripts/Validate-Packages.ps1 -PackageRoot ./nupkgs -ExpectedVersion ${{ steps.version.outputs.version }}

      - name: Push public packages to nuget.org
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path ./nupkgs/*.nupkg | Where-Object { $_.Name -notlike "*.symbols.nupkg" }
          foreach ($package in $packages) {
            dotnet nuget push $package.FullName --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
          }

      - name: Push symbol packages to nuget.org
        shell: pwsh
        run: |
          $symbolPackages = Get-ChildItem -Path ./nupkgs/*.snupkg -ErrorAction SilentlyContinue
          if ($symbolPackages.Count -eq 0) {
            Write-Host "No symbol packages were generated for this tag."
            exit 0
          }

          foreach ($package in $symbolPackages) {
            dotnet nuget push $package.FullName --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
          }

      - name: Update GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: |
            ./nupkgs/*.nupkg
            ./nupkgs/*.snupkg
          fail_on_unmatched_files: false
