name: Bug report
description: Report a behavior defect, compatibility regression, or validation gap
title: "[bug] "
labels:
  - 'kind: bug'
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Choose the closest product area.
      options:
        - 'area: core'
        - 'area: avalonia'
        - 'area: windows'
        - 'area: linux'
        - 'area: macos'
        - 'area: surfacecharts'
    validations:
      required: true
  - type: dropdown
    id: install_path
    attributes:
      label: Install path
      description: Which consumer path reproduced the issue?
      options:
        - nuget.org public packages
        - GitHub Packages preview packages
        - Repository source build
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version or commit
      description: For example `0.1.0-alpha.2` or a repository SHA.
    validations:
      required: true
  - type: input
    id: host_environment
    attributes:
      label: Host environment
      description: Operating system, GPU, driver, and display-server/session details if relevant.
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: diagnostics
    attributes:
      label: Diagnostics snapshot
      description: Paste the diagnostics snapshot from `VideraDiagnosticsSnapshotFormatter.Format(View3D.BackendDiagnostics)`, including resolved backend, fallback reason, and Linux display-server fields when relevant.
      render: text
    validations:
      required: true
  - type: textarea
    id: surfacecharts_support_summary
    attributes:
      label: SurfaceCharts support summary
      description: If Area is `area: surfacecharts`, paste `surfacecharts-support-summary.txt` from `smoke/Videra.SurfaceCharts.ConsumerSmoke` or the `Support summary` from `Videra.SurfaceCharts.Demo`. Do not replace it with `VideraDiagnosticsSnapshotFormatter` output; use `Copy support summary` on the matching chart path.
      render: text
    validations:
      required: false
  - type: textarea
    id: visual_evidence
    attributes:
      label: Performance Lab visual evidence
      description: If the issue depends on visual output, attach or link `artifacts/performance-lab-visual-evidence/performance-lab-visual-evidence-manifest.json`, `performance-lab-visual-evidence-summary.txt`, relevant PNG files, and per-scenario diagnostics text. These files are evidence-only, not pixel-perfect visual-regression gates or benchmark guarantees.
      render: text
    validations:
      required: false
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include steps, commands, logs, screenshots, matching-host validation notes, and whether the issue reproduces in Videra.MinimalSample or consumer smoke.
    validations:
      required: true
