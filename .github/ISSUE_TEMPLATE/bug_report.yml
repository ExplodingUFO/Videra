name: Bug report
description: Report a behavior defect, compatibility regression, or validation gap
title: "[bug] "
labels:
  - kind: bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Choose the closest product area.
      options:
        - area: core
        - area: avalonia
        - area: windows
        - area: linux
        - area: macos
        - area: surfacecharts
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug and the expected behavior.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Include steps, commands, logs, screenshots, or matching-host validation notes.
    validations:
      required: true
