name: Feature request
description: Propose a user-facing capability, API change, or docs improvement
title: "[feature] "
labels:
  - kind: feature
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Choose the closest product area.
      options:
        - area: core
        - area: avalonia
        - area: windows
        - area: linux
        - area: macos
        - area: surfacecharts
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: Explain the scenario, gap, or user need.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the intended feature, docs change, or API adjustment.
    validations:
      required: true
