name: Feature request
description: Propose a user-facing capability, API change, or docs improvement
title: "[feature] "
labels:
  - 'kind: feature'
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Choose the closest product area.
      options:
        - 'area: core'
        - 'area: avalonia'
        - 'area: windows'
        - 'area: linux'
        - 'area: macos'
        - 'area: surfacecharts'
    validations:
      required: true
  - type: dropdown
    id: consumer_path
    attributes:
      label: Consumer path
      description: Which public entry path is this request trying to improve?
      options:
        - Happy path (`Videra.MinimalSample` / `Videra.Avalonia` README)
        - Extensibility (`VideraView.Engine`)
        - Interaction contract
        - Consumer smoke / install validation
        - Benchmark / regression workflow
        - Alpha docs / support surface
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: Explain the scenario, gap, or user need.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the intended feature, docs change, or API adjustment, and say whether it changes the default happy path or an advanced integration path.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or reproduction context
      description: Link sample code, diagnostics, benchmark artifacts, or reproduction notes that justify the request.
    validations:
      required: true
