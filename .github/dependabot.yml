version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: weekly
    groups:
      shared-test-tooling:
        patterns:
          - "Microsoft.NET.Test.Sdk"
          - "xunit"
          - "xunit.runner.visualstudio"
          - "FluentAssertions"
          - "coverlet.collector"
      analyzers:
        patterns:
          - "Microsoft.CodeAnalysis.NetAnalyzers"
          - "SonarAnalyzer.CSharp"
    labels:
      - dependencies
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: weekly
    labels:
      - dependencies
    open-pull-requests-limit: 5
